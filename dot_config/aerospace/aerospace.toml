# 'start-at-login' needs to be 'true' for 'after-login-command' to work
# Available commands: https://nikitabobko.github.io/AeroSpace/commands
after-login-command = []

# You can use it to add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = [
  # JankyBorders has a built-in detection of already running process,
  # so it won't be run twice on AeroSpace restart
  'exec-and-forget /opt/homebrew/opt/sketchybar/bin/sketchybar',
  'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=5.0',
  # 'exec-and-forget /opt/homebrew/opt/borders/bin/borders active_color="glow(0xd943ff64)" inactive_color=0x20494d64 width=8.0'
]

exec-on-workspace-change = [
    '/bin/bash',
    '-c',
    '/opt/homebrew/opt/sketchybar/bin/sketchybar --trigger aerospace_workspace_change AEROSPACE_FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE AEROSPACE_PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE',
]

# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
# enable-normalization-flatten-containers = false
# enable-normalization-opposite-orientation-for-nested-containers = false

accordion-padding = 30
# automatically-unhide-macos-hidden-apps = true
default-root-container-layout = "tiles"
default-root-container-orientation = "auto"
# on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
# on-focus-changed = ['move-mouse window-lazy-center']

[gaps.inner]
horizontal = 10
vertical = 10

[gaps.outer]
bottom = 10
left = 10
right = 10
top = [
  { monitor."Built-in Retina Display" = 10 },
  45,
]

# [key-mapping]
# preset = "colemak"
# # Turn into colemak-dk
# [key-mapping.key-notation-to-key-code]
#   h = "m"
#   m = "h"
#   b = "t"
#   d = "c"


[workspace-to-monitor-force-assignment]
# 1 = 'main'
# 4 = 'secondary'
M = 'secondary'

[mode.main.binding]

# Focus
cmd-ctrl-alt-f = "fullscreen"
cmd-ctrl-alt-h = 'exec-and-forget ~/.config/aerospace/bin/wezterm-smart-focus left'
cmd-ctrl-alt-j = 'exec-and-forget ~/.config/aerospace/bin/wezterm-smart-focus down'
cmd-ctrl-alt-k = 'exec-and-forget ~/.config/aerospace/bin/wezterm-smart-focus up'
cmd-ctrl-alt-l = 'exec-and-forget ~/.config/aerospace/bin/wezterm-smart-focus right'
cmd-ctrl-alt-left = 'exec-and-forget ~/.config/aerospace/bin/wezterm-smart-focus left'
cmd-ctrl-alt-down = 'exec-and-forget ~/.config/aerospace/bin/wezterm-smart-focus down'
cmd-ctrl-alt-up = 'exec-and-forget ~/.config/aerospace/bin/wezterm-smart-focus up'
cmd-ctrl-alt-right = 'exec-and-forget ~/.config/aerospace/bin/wezterm-smart-focus right'

# Move
cmd-ctrl-alt-shift-h = "move left"
cmd-ctrl-alt-shift-j = "move down"
cmd-ctrl-alt-shift-k = "move up"
cmd-ctrl-alt-shift-l = "move right"
cmd-ctrl-alt-shift-left = "move left"
cmd-ctrl-alt-shift-down = "move down"
cmd-ctrl-alt-shift-up = "move up"
cmd-ctrl-alt-shift-right = "move right"

# Resize
cmd-ctrl-alt-shift-minus = "resize smart -50"
cmd-ctrl-alt-shift-equal = "resize smart +50"
cmd-ctrl-alt-shift-0 = "balance-sizes"

# Workspaces
cmd-ctrl-alt-1 = "workspace 1"
cmd-ctrl-alt-2 = "workspace 2"
cmd-ctrl-alt-3 = "workspace 3"
cmd-ctrl-alt-4 = "workspace 4"
cmd-ctrl-alt-5 = "workspace 5"
cmd-ctrl-alt-6 = "workspace 6"
cmd-ctrl-alt-7 = "workspace 7"
cmd-ctrl-alt-8 = "workspace 8"
cmd-ctrl-alt-9 = "workspace 9"
# cmd-ctrl-alt-0 = "workspace 0"
cmd-ctrl-alt-e = "workspace E"
cmd-ctrl-alt-b = "workspace B"
cmd-ctrl-alt-m = "workspace M"
cmd-ctrl-alt-t = "workspace T"

cmd-ctrl-alt-shift-1 = "move-node-to-workspace 1 --focus-follows-window"
cmd-ctrl-alt-shift-2 = "move-node-to-workspace 2 --focus-follows-window"
cmd-ctrl-alt-shift-3 = "move-node-to-workspace 3 --focus-follows-window"
cmd-ctrl-alt-shift-4 = "move-node-to-workspace 4 --focus-follows-window"
cmd-ctrl-alt-shift-5 = "move-node-to-workspace 5 --focus-follows-window"
cmd-ctrl-alt-shift-6 = "move-node-to-workspace 6 --focus-follows-window"
cmd-ctrl-alt-shift-7 = "move-node-to-workspace 7 --focus-follows-window"
cmd-ctrl-alt-shift-8 = "move-node-to-workspace 8 --focus-follows-window"
cmd-ctrl-alt-shift-9 = "move-node-to-workspace 9 --focus-follows-window"
cmd-ctrl-alt-shift-e = "move-node-to-workspace E --focus-follows-window"
cmd-ctrl-alt-shift-b = "move-node-to-workspace B --focus-follows-window"
cmd-ctrl-alt-shift-m = "move-node-to-workspace M --focus-follows-window"
cmd-ctrl-alt-shift-t = "move-node-to-workspace T --focus-follows-window"

# Hyper app launchers. Window management above uses Meh; these stay on Hyper.
cmd-ctrl-alt-shift-a = 'exec-and-forget open -a "Activity Monitor"'
cmd-ctrl-alt-shift-c = 'exec-and-forget open -a "ChatGPT Atlas"'
cmd-ctrl-alt-shift-f = 'exec-and-forget open -a "Finder"'
cmd-ctrl-alt-shift-i = 'exec-and-forget open -a "Mail"'
cmd-ctrl-alt-shift-p = 'exec-and-forget open -a "Music"'
cmd-ctrl-alt-shift-y = 'exec-and-forget open -a "System Settings"'
cmd-ctrl-alt-shift-w = 'exec-and-forget open -a "WhatsApp"'
# Exception: always open a new WezTerm window
cmd-ctrl-alt-shift-enter = 'exec-and-forget /opt/homebrew/bin/wezterm start'

# Layout
cmd-ctrl-alt-comma = "layout accordion horizontal vertical"
cmd-ctrl-alt-slash = "layout tiles horizontal vertical"

cmd-ctrl-alt-tab = "workspace-back-and-forth"
cmd-ctrl-alt-shift-tab = [
  "move-workspace-to-monitor --wrap-around next",
  'exec-and-forget sketchybar --trigger aerospace_monitor_change TARGET_MONITOR=$(aerospace list-monitors --focused --format "%{monitor-appkit-nsscreen-screens-id}") FOCUSED_WORKSPACE=$(aerospace list-workspaces --focused)',
]

# Modes
cmd-ctrl-alt-shift-semicolon = "mode service"

[mode.service.binding]
esc = ["reload-config", "mode main"]
cmd-ctrl-alt-shift-h = ["join-with left", "mode main"]
cmd-ctrl-alt-shift-j = ["join-with down", "mode main"]
cmd-ctrl-alt-shift-k = ["join-with up", "mode main"]
cmd-ctrl-alt-shift-l = ["join-with right", "mode main"]
h = ["join-with left", "mode main"]
j = ["join-with down", "mode main"]
k = ["join-with up", "mode main"]
l = ["join-with right", "mode main"]
left = ["join-with left", "mode main"]
down = ["join-with down", "mode main"]
up = ["join-with up", "mode main"]
right = ["join-with right", "mode main"]
backspace = ["close-all-windows-but-current", "mode main"]
f = ["layout floating tiling", "mode main"]
r = ["flatten-workspace-tree", "mode main"] # reset layout
p = [
  'exec-and-forget ~/.config/aerospace/bin/aerospace-cleanup',
  'exec-and-forget /opt/homebrew/bin/sketchybar --reload',
  "mode main"
]
shift-p = [
  'exec-and-forget ~/.config/aerospace/bin/prune-windows',
  "mode main"
]
cmd-ctrl-alt-shift-r = ['exec-and-forget /opt/homebrew/bin/sketchybar --reload']

# [[on-window-detected]]
# run = "move-node-to-workspace 1"
#
# [on-window-detected.if]
# app-name-regex-substring = "finder"

[[on-window-detected]]
run = "move-node-to-workspace E"
[on-window-detected.if]
app-name-regex-substring = "mail|spark|outlook|superhuman|hey|thunderbird|canary|mimestream|whatsapp"

# [[on-window-detected]]
# run = "move-node-to-workspace T"
# [on-window-detected.if]
# app-name-regex-substring = "wezterm|kitty|ghostty"

[[on-window-detected]]
run = "move-node-to-workspace B"
[on-window-detected.if]
app-name-regex-substring = "zen|arc|safari|brave|orion|comet|atlas|firefox|chrome|chromium|vivaldi|edge"

[[on-window-detected]]
run = "move-node-to-workspace M"
[on-window-detected.if]
app-name-regex-substring = "spotify|music"

[[on-window-detected]]
run = ["layout floating"]
[on-window-detected.if]
app-name-regex-substring = "weather|contacts"
