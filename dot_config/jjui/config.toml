[[actions]]
name = "jw-switch-interactive"
lua = '''
local out, err = jj("workspace", "list", "--color", "never")
if err then
  flash({ text = err, error = true })
  return
end

local names = {}
for line in split_lines(out) do
  local name = line:match("^. ([^:]+):")
  if name and name ~= "" then
    table.insert(names, name)
  end
end

if #names == 0 then
  flash({ text = "No workspaces found", error = true })
  return
end

local selected = choose({ options = names, title = "Switch workspace" })
if not selected then
  return
end

local quoted = "'" .. selected:gsub("'", "'\\''") .. "'"
exec_shell("jw switch " .. quoted)
'''

[[bindings]]
action = "jw-switch-interactive"
seq = ["\\", "w", "s"]
scope = "revisions"
desc = "jw interactive switch"

[[actions]]
name = "jw-switch-at-change"
lua = '''
local id = context.change_id()
if not id then
  flash({ text = "No change selected", error = true })
  return
end

local name = input({ title = "jw switch --at", prompt = "Workspace name:" })
if not name or name == "" then
  return
end

local quoted = "'" .. name:gsub("'", "'\\''") .. "'"
exec_shell("jw switch " .. quoted .. " --at " .. id)
'''

[[bindings]]
action = "jw-switch-at-change"
seq = ["\\", "w", "n"]
scope = "revisions"
desc = "jw switch --at"
