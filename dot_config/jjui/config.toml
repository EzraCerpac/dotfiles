[[actions]]
name = "show-oplog-diff"
lua = '''
local op_id = context.operation_id()
if not op_id then
  flash({ text = "No operation selected", error = true })
  return
end

local out, err = jj("op", "show", op_id, "--color", "always")
if err then
  flash({ text = err, error = true })
  return
end

jjui.diff.show(out)
'''

[[bindings]]
action = "show-oplog-diff"
key = "ctrl+o"
scope = "oplog"
desc = "show oplog diff"

