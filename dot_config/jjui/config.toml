[[actions]]
name = "show-oplog-diff"
lua = '''
local op_id = context.operation_id()
if not op_id then
  flash({ text = "No operation selected", error = true })
  return
end

local out, err = jj("op", "show", op_id, "--color", "always")
if err then
  flash({ text = err, error = true })
  return
end

jjui.diff.show(out)
'''

[[bindings]]
action = "show-oplog-diff"
key = "ctrl+o"
scope = "oplog"
desc = "show oplog diff"

[[actions]]
name = "resolve"
lua = '''
jj_interactive("resolve", "--tool", "pycharm")
'''

[[bindings]]
action = "resolve"
key = "R"
scope = "revisions"
desc = "resolve"

[[actions]]
name = "new-main"
lua = '''
jj_async("new", "main")
revisions.refresh()
'''

[[actions]]
name = "tug"
lua = '''
local id = context.change_id()
if not id then
  flash({ text = "No change selected", error = true })
  return
end

jj_async(
  "bookmark",
  "move",
  "--from",
  "closest_bookmark(" .. id .. ")",
  "--to",
  "closest_pushable(" .. id .. ")"
)
revisions.refresh()
'''

[[bindings]]
action = "tug"
key = "ctrl+t"
scope = "revisions"
desc = "tug"

[[actions]]
name = "show-after-revisions"
lua = '''
local id = context.change_id()
if not id then
  flash({ text = "No change selected", error = true })
  return
end

revset.set("::" .. id)
'''

[[bindings]]
action = "show-after-revisions"
key = "M"
scope = "revisions"
desc = "show descendants"

[[actions]]
name = "toggle-parent"
lua = '''
local id = context.change_id()
if not id then
  flash({ text = "No change selected", error = true })
  return
end

jj_async(
  "rebase",
  "-r",
  "@",
  "-d",
  "all:(parents(@) | " .. id .. ") ~ (parents(@) & " .. id .. ")"
)
revisions.refresh()
'''

[[bindings]]
action = "toggle-parent"
key = "ctrl+p"
scope = "revisions"
desc = "toggle parent"

