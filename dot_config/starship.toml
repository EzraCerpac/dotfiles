"$schema" = 'https://starship.rs/config-schema.json'

# If needed add back:
# $username\
# $git_branch
# $git_status
format = """
[ŌĢŁ](bold overlay1)$directory\
${custom.jj}\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$lua\
$docker_context\
$line_break$character"""

palette = 'nord'

[palettes.nord]
rosewater = "#f0c674"
flamingo = "#cc6666"
pink = "#b294bb"
orange = "#de935f"
red = "#cc6666"
maroon = "#a54242"
peach = "#d08770"
yellow = "#f0c674"
green = "#8abeb7"
teal = "#8abeb7"
sky = "#81a2be"
sapphire = "#81a2be"
blue = "#5e81ac"
lavender = "#b48ead"
text = "#d8dee9"
subtext1 = "#e5e9f0"
subtext0 = "#eceff4"
overlay2 = "#4c566a"
overlay1 = "#434c5e"
overlay0 = "#3b4252"
surface2 = "#2e3440"
surface1 = "#2e3440"
surface0 = "#2e3440"
base = "#2e3440"
mantle = "#3b4252"
crust = "#434c5e"

[custom.jj]
command = "prompt"
format = "$output"
ignore_timeout = true
shell = ["starship-jj", "--ignore-working-copy", "starship"]
use_stdin = false
when = true

# OS Module
[os]
disabled = false
style = "fg:text"

[os.symbols]
Windows = "¾░Ź▓"
Ubuntu = "¾░Ģł"
SUSE = "’īö"
Raspbian = "¾░É┐"
Mint = "¾░ŻŁ"
Macos = "Ņ£æ"
Manjaro = "’īÆ"
Linux = "¾░īĮ"
Gentoo = "¾░Ż©"
Fedora = "¾░Żø"
Alpine = "’īĆ"
Amazon = "’ē░"
Android = "Ņ£Ä"
Arch = "¾░Żć"
Artix = "¾░Żć"
CentOS = "’īä"
Debian = "¾░ŻÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"

# Username Module
[username]
show_always = true
style_user = "fg:blue"
style_root = "fg:blue"
format = '[ $user ]($style)'

# Local IP Module
[localip]
ssh_only = false
style = "fg:surface0"
format = '[ $localipv4 ]($style)'
disabled = false

# Directory Module
[directory]
style = "fg:peach"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "
"Developer" = "¾░▓ŗ "

# Git Branch Module
[git_branch]
symbol = "’Éś"
style = "fg:teal"
format = '[[ $symbol $branch ](fg:green)]($style)'

# Git Status Module
[git_status]
style = "fg:teal"
format = '[[($all_status$ahead_behind )](fg:green)]($style)'

# Node.js Module
[nodejs]
symbol = "Ņ£ś"
style = "fg:teal"
format = '[[ $symbol( $version) ](fg:teal)]($style)'

# C Module
